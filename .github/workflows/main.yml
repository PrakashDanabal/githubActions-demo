name: Update Manual Release Notes File

on:
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  update-notes:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essential for the action to commit the file back to your repo

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history so it can generate a proper changelog

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and Update RELEASE_NOTES.md
        run: |
          echo "# test release note" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "${{ steps.changelog.outputs.changelog }}" >> RELEASE_NOTES.md
          
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add RELEASE_NOTES.md
          git commit -m "docs: update RELEASE_NOTES.md for manual trigger"
          git push
